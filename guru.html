  <style>
    *, *::before, *::after {
      font-family: 'Poppins', sans-serif;
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html, body {
      height: 100%;
      width: 100%;
      background: white;
    }

    .carousel-container {
      width: 100%;
      height: 100%;
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .carousel-track {
      display: flex;
      animation: scroll 40s linear infinite;
      padding: 20px 0;
    }

    .carousel-track:hover {
      animation-play-state: paused;
    }

    .teacher-card {
      flex-shrink: 0;
      overflow: hidden;
      position: relative;
      transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
    }

    .teacher-card:hover {
      transform: scale(1.15);
      z-index: 10;
      box-shadow: 0 15px 30px rgba(0,0,0,0.2);
    }

    .teacher-card img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      transition: transform 0.3s ease;
      display: block;
    }

    .teacher-card:hover img {
      transform: scale(1.05);
    }

    .fallback-avatar {
      width: 100%;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
    }

    /* ===== MOBILE ===== */
    @media (max-width: 640px) {
      .teacher-card {
        width: 120px;
        height: 160px;
        margin: 0 8px;
        border-radius: 8px;
      }

      .fallback-avatar { font-size: 1.5rem; }

      @keyframes scroll {
        0%   { transform: translateX(0); }
        100% { transform: translateX(calc(-120px * 14)); }
      }
    }

    /* ===== TABLET ===== */
    @media (min-width: 641px) and (max-width: 1024px) {
      .teacher-card {
        width: 160px;
        height: 220px;
        margin: 0 15px;
        border-radius: 10px;
      }

      .fallback-avatar { font-size: 2rem; }

      @keyframes scroll {
        0%   { transform: translateX(0); }
        100% { transform: translateX(calc(-160px * 14)); }
      }
    }

    /* ===== DESKTOP ===== */

      }
    }
  </style>
